<!-- Temporary debug page to view raw quiz data -->
<!DOCTYPE html>
<html>
<head>
    <title>Quiz Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        pre { background: white; padding: 15px; border-radius: 5px; overflow-x: auto; border: 1px solid #ddd; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Quiz Data Debug</h1>
        <p>Loading quiz data from API...</p>
        <pre id="output">Loading...</pre>
    </div>

    <script>
        (async function() {
            try {
                const response = await fetch('https://api.plateforme-test-infinitiax.com/api/v1/courses/69284a048e6744ee5b47f3de/lessons/TEST%20DES%20QUIZ');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                const output = document.getElementById('output');
                
                // Show questions structure
                const html = `<strong>Total Questions:</strong> ${data.quiz.questions.length}\n\n`;
                
                // Focus on question 5 (index 4)
                const q5 = data.quiz.questions[4];
                output.innerHTML = html + `<strong>Question 5 (index 4) - Raw Data:</strong>\n${JSON.stringify(q5, null, 2)}`;
                
                // Log all keys
                console.log('Question 5 keys:', Object.keys(q5));
                console.log('Question 5 full:', q5);
                
            } catch (err) {
                document.getElementById('output').innerText = `Error: ${err.message}`;
                console.error('Error:', err);
            }
        })();
    </script>
</body>
</html>
